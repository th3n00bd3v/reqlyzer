<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Reqlyzer</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="css/styles.css">

</head>

<body class="bg-light">

<!-- ====================================== -->
<!-- Navbar -->
<!-- ====================================== -->

<nav class="navbar navbar-dark bg-dark shadow-sm">

    <div class="container-fluid">

        <span class="navbar-brand fw-bold">

            Reqlyzer

        </span>

        <span class="text-light">

            AI Powered Backend Request Analyzer

        </span>

    </div>

</nav>

<div class="container my-4">

    <!-- ====================================== -->
    <!-- Upload -->
    <!-- ====================================== -->

    <div class="card shadow-sm mb-4">

        <div class="card-header">

            <strong>Upload HAR File</strong>

        </div>

        <div class="card-body">

            <div class="row g-3 align-items-center">

                <div class="col-md-8">

                    <input
                        id="harFile"
                        class="form-control"
                        type="file"
                        accept=".har">

                </div>

                <div class="col-md-4 d-grid">

                    <button
                        id="analyzeBtn"
                        class="btn btn-primary">

                        Analyze HAR

                    </button>

                </div>

            </div>

            <div
                id="loadingSpinner"
                class="spinner-border text-primary mt-3 d-none"
                role="status">

            </div>

        </div>

    </div>

    <!-- ====================================== -->
    <!-- Summary -->
    <!-- ====================================== -->

    <div class="row g-3 mb-4">

        <div class="col-lg col-md-4">

            <div class="card text-center shadow-sm">

                <div class="card-body">

                    <h6 class="text-muted">

                        Total Requests

                    </h6>

                    <h2 id="totalRequests">0</h2>

                </div>

            </div>

        </div>

        <div class="col-lg col-md-4">

            <div class="card text-center border-success shadow-sm">

                <div class="card-body">

                    <h6 class="text-success">

                        Low

                    </h6>

                    <h2 id="lowRisk">0</h2>

                </div>

            </div>

        </div>

        <div class="col-lg col-md-4">

            <div class="card text-center border-warning shadow-sm">

                <div class="card-body">

                    <h6 class="text-warning">

                        Medium

                    </h6>

                    <h2 id="mediumRisk">0</h2>

                </div>

            </div>

        </div>

        <div class="col-lg col-md-6">

            <div class="card text-center border-danger shadow-sm">

                <div class="card-body">

                    <h6 class="text-danger">

                        High

                    </h6>

                    <h2 id="highRisk">0</h2>

                </div>

            </div>

        </div>

        <div class="col-lg col-md-6">

            <div class="card text-center border-dark shadow-sm">

                <div class="card-body">

                    <h6>

                        Critical

                    </h6>

                    <h2 id="criticalRisk">0</h2>

                </div>

            </div>

        </div>

    </div>

    <!-- ====================================== -->
    <!-- Requests -->
    <!-- ====================================== -->

    <div class="card shadow-sm mb-4">

        <div class="card-header">

            <strong>Analyzed Requests</strong>

        </div>

        <div class="card-body p-0">

            <div class="p-3 border-bottom">

                <input
                    id="requestSearch"
                    class="form-control"
                    type="text"
                    placeholder="Search by host, endpoint or HTTP method...">

            </div>

            <div class="table-responsive requests-table">

                <table class="table table-hover table-striped align-middle mb-0">

                    <thead class="table-dark">

                        <tr>

                            <th>#</th>

                            <th>Method</th>

                            <th>Host</th>

                            <th>Endpoint</th>

                            <th>Status</th>

                            <th>Risk</th>

                        </tr>

                    </thead>

                    <tbody id="requestsTable">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- ====================================== -->
    <!-- Request Analysis -->
    <!-- ====================================== -->

    <div class="card shadow-sm">

        <div class="card-header bg-dark text-white">

            <strong>Request Analysis</strong>

        </div>

        <div class="card-body analysis-panel">

            <div class="row g-3">

                <div class="col-md-6">

                    <div class="card border-primary h-100">

                        <div class="card-header bg-primary text-white">

                            WHAT

                        </div>

                        <div class="card-body">

                            <p id="whatText">

                                Select a request to begin.

                            </p>

                        </div>

                    </div>

                </div>

                <div class="col-md-6">

                    <div class="card border-success h-100">

                        <div class="card-header bg-success text-white">

                            WHO

                        </div>

                        <div class="card-body">

                            <p id="whoText"></p>

                        </div>

                    </div>

                </div>

                <div class="col-md-6">

                    <div class="card border-warning h-100">

                        <div class="card-header bg-warning">

                            WHY

                        </div>

                        <div class="card-body">

                            <p id="whyText"></p>

                        </div>

                    </div>

                </div>

                <div class="col-md-6">

                    <div class="card border-info h-100">

                        <div class="card-header bg-info text-white">

                            WHERE

                        </div>

                        <div class="card-body">

                            <p id="whereText"></p>

                        </div>

                    </div>

                </div>

                <div class="col-12">

                    <div class="card border-secondary">

                        <div class="card-header bg-secondary text-white">

                            HOW

                        </div>

                        <div class="card-body">

                            <p id="howText"></p>

                        </div>

                    </div>

                </div>

            </div>

            <hr class="my-4">

            <div class="row g-3">

                <div class="col-lg-6">

                    <div class="card h-100">

                        <div class="card-header bg-light">

                            <strong>Security Findings</strong>

                        </div>

                        <div class="card-body">

                            <div id="securityFindings">

                                Select a request.

                            </div>

                        </div>

                    </div>

                </div>

                <div class="col-lg-6">

                    <div class="card h-100">

                        <div class="card-header bg-light">

                            <strong>Recommendations</strong>

                        </div>

                        <div class="card-body">

                            <ul
                                id="recommendations"
                                class="mb-0">

                            </ul>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/upload.js"></script>

</body>

</html>
